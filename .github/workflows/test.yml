name: Tests

on:
  pull_request:
    branches:
      - main

jobs:
  junit:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'
          cache: maven

      - name: Check code formatting (Spotless)
        run: mvn -B spotless:check

      - name: Run Maven tests
        run: mvn -B test
